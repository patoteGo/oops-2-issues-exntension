name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Pinned to match local dev. `npm install` (not `npm ci`) is
          # intentional: vitest/vite ship per-platform optional native
          # binaries (lightningcss, @rolldown/binding), and a lockfile built
          # on one OS omits the others — `npm ci` then fails on a different
          # runner OS.
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm test
      - name: Build extension
        run: npm run build
